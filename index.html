<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eduverse - Educational Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #5b21b6;
    --primary-light: #7c3aed;
    --accent: #f59e0b;
    --accent-2: #10b981;
    --danger: #ef4444;
    --bg: #f5f3ff;
    --surface: #ffffff;
    --text: #1e1b4b;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --shadow: 0 4px 24px rgba(91,33,182,0.10);
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Navbar */
  .navbar {
    background: var(--surface);
    box-shadow: 0 1px 0 var(--border), var(--shadow);
    padding: 1rem 2rem;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-container {
    max-width: 1300px; margin: 0 auto;
    display: flex; justify-content: space-between; align-items: center;
  }
  .logo {
    font-size: 1.5rem; font-weight: 800; color: var(--primary);
    letter-spacing: -0.5px;
  }
  .nav-links {
    display: flex; gap: 0.8rem; flex-wrap: wrap;
  }
  .nav-btn {
    background: transparent; color: var(--text-muted);
    border: 1.5px solid var(--border);
    padding: 0.6rem 1.2rem; border-radius: 50px;
    cursor: pointer; font-weight: 600; font-size: 0.9rem;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--primary); color: var(--primary); }
  .nav-btn.active {
    background: var(--primary); color: white; border-color: var(--primary);
  }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, var(--primary) 0%, #4c1d95 100%);
    color: white; text-align: center; padding: 4rem 1rem 3rem;
  }
  .hero h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 0.5rem; }
  .hero p { font-size: 1.1rem; opacity: 0.9; }

  .container { max-width: 1300px; margin: 0 auto; padding: 2rem 1rem; }

  .portal-section { display: none; }
  .portal-section.active { display: block; animation: fadeIn 0.4s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1.2rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface); padding: 1.5rem;
    border-radius: var(--radius); box-shadow: var(--shadow);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 1rem;
  }

  /* Cards */
  .section-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.8rem;
    margin-bottom: 1.8rem;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .catalogue-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
  }
  .document-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .document-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(91,33,182,0.15);
  }
  .card-image {
    height: 140px;
    background: linear-gradient(135deg, var(--primary), #4c1d95);
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    color: white;
  }
  .card-content { padding: 1.2rem; }
  .card-title { font-size: 1.1rem; font-weight: 700; margin: 0.5rem 0; }
  .card-price { font-size: 1.5rem; font-weight: 800; color: var(--accent-2); margin: 0.5rem 0; }
  .btn-pay {
    background: linear-gradient(135deg, var(--primary-light), var(--primary));
    color: white; border: none; padding: 0.75rem;
    border-radius: 50px; width: 100%; font-weight: 700;
    cursor: pointer; margin-top: 0.8rem;
  }

  /* Filter */
  .filter-bar {
    background: var(--surface); padding: 1.2rem;
    border-radius: var(--radius); margin-bottom: 1.5rem;
    border: 1px solid var(--border);
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--primary); color: white;
    padding: 1rem 1.8rem; border-radius: 50px;
    font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 9999; opacity: 0; transition: all 0.4s;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 2000; }
  .modal.open { display: flex; }
  .modal-content { background: white; padding: 2rem; border-radius: 20px; width: 90%; max-width: 500px; }

  footer { text-align: center; padding: 2rem; color: #666; margin-top: 3rem; }
</style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-container">
    <div class="logo">📚 Eduverse</div>
    <div class="nav-links">
      <button class="nav-btn" id="adminPortalBtn">👑 Admin</button>
      <button class="nav-btn active" id="teacherPortalBtn">👩‍🏫 Teacher</button>
      <button class="nav-btn" id="pupilPortalBtn">🎓 Pupil</button>
      <button class="nav-btn" id="logoutBtn" style="display:none;">Logout</button>
    </div>
  </div>
</nav>

<!-- Hero -->
<div class="hero">
  <h1>Welcome to Eduverse</h1>
  <p>Quality educational resources at your fingertips</p>
</div>

<div class="container">

  <!-- ADMIN PORTAL -->
  <section id="portal-admin" class="portal-section">
    <div class="stats-grid">
      <div class="stat-card"><div>📄</div><div><strong id="total-docs">0</strong><br>Total Documents</div></div>
      <div class="stat-card"><div>💰</div><div><strong id="total-revenue">0</strong><br>Catalogue Value</div></div>
    </div>
    <div class="section-card">
      <h3>Upload New Document</h3>
      <!-- Your upload form here -->
      <form id="uploadForm">
        <input type="file" id="file-input" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx">
        <button type="submit" class="btn-pay">Upload to Catalogue</button>
      </form>
    </div>
  </section>

  <!-- TEACHER PORTAL -->
  <section id="portal-teacher" class="portal-section active">
    <div class="filter-bar">
      <label>Filter by Category</label>
      <select id="teacher-filter">
        <option value="">All Categories</option>
        <option>Curriculum book</option>
        <option>Syllabus</option>
        <option>Schemes of work</option>
        <option>Text books</option>
        <option>Past examination papers</option>
        <option>Lesson plans</option>
      </select>
    </div>
    <div class="catalogue-grid" id="teacher-catalogue"></div>
  </section>

  <!-- PUPIL PORTAL -->
  <section id="portal-pupil" class="portal-section">
    <div class="filter-bar">
      <label>Filter by Category</label>
      <select id="pupil-filter">
        <option value="">All Categories</option>
        <option>Text books</option>
        <option>Past examination papers</option>
      </select>
    </div>
    <div class="catalogue-grid" id="pupil-catalogue"></div>
  </section>

</div>

<footer>
  Eduverse © 2026 • Powered by Pesapal & Firebase
</footer>

<!-- Scripts -->
<script src="config.js"></script>
<script src="payment.js"></script>
<script>
// Tab Navigation
const tabs = {
  admin: document.getElementById('adminPortalBtn'),
  teacher: document.getElementById('teacherPortalBtn'),
  pupil: document.getElementById('pupilPortalBtn')
};

Object.keys(tabs).forEach(key => {
  tabs[key].addEventListener('click', () => {
    document.querySelectorAll('.portal-section').forEach(s => s.classList.remove('active'));
    document.getElementById(`portal-${key}`).classList.add('active');

    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    tabs[key].classList.add('active');
  });
});

// Example Document Rendering (Replace with real fetch from backend)
function renderDocuments(containerId, isTeacher) {
  const container = document.getElementById(containerId);
  container.innerHTML = `
    <div class="document-card">
      <div class="card-image">📘</div>
      <div class="card-content">
        <h3 class="card-title">Sample Mathematics Notes</h3>
        <p class="card-price">K 5.00</p>
        <button class="btn-pay" onclick="buyDocument(1, 'Sample Mathematics Notes', 5)">Pay with Mobile Money</button>
      </div>
    </div>
    <!-- Add more cards as needed -->
  `;
}

function buyDocument(id, title, price) {
  const buyerName = prompt("Enter your name:") || "Student";
  const buyerEmail = prompt("Enter your email:") || "user@example.com";
  initiatePayment(id, title, price, buyerEmail, buyerName);
}

// Initial Render
renderDocuments('teacher-catalogue', true);
renderDocuments('pupil-catalogue', false);

</script>
</body>
</html>
